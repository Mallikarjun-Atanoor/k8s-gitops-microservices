apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: tic-tac-toe

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:

      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: frontend

        image: 755395261632.dkr.ecr.us-east-1.amazonaws.com/platform/tic-tac-toe/front-end:v4

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 50m
            memory: 64Mi

          limits:
            cpu: 200m
            memory: 256Mi