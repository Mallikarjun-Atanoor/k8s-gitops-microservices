apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: tic-tac-toe
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: ClusterSecretStore
  target:
    name: db-secret
  data:
  - secretKey: username
    remoteRef:
      key: tic-tac-toe-db
      property: username
  - secretKey: password
    remoteRef:
      key: tic-tac-toe-db
      property: password