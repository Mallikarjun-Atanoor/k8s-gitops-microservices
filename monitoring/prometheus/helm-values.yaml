# kube-prometheus-stack values

grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  service:
    type: NodePort
    nodePort: 30001

  persistence:
    enabled: true
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 200m
      memory: 256Mi

prometheus:

  prometheusSpec:

    retention: 7d

    resources:
      requests:
        cpu: 200m
        memory: 512Mi

      limits:
        cpu: 500m
        memory: 1Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce

          resources:
            requests:
              storage: 10Gi

alertmanager:

  enabled: true

  alertmanagerSpec:

    resources:
      requests:
        cpu: 100m
        memory: 128Mi

      limits:
        cpu: 500m
        memory: 512Mi

kubeEtcd:
  enabled: true

kubeScheduler:
  enabled: true

kubeControllerManager:
  enabled: true